name: Backmerge release to pre-release

on:
  push:
    branches:
      - release

jobs:
  backmerge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pre-release
        uses: actions/checkout@v4
        with:
          ref: pre-release
          fetch-depth: 0
          token: ${{ secrets.BACKMERGE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.BACKMERGE_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Merge release into pre-release
        run: |
          git fetch origin release
          if ! git merge origin/release; then
            echo "::error::Merge conflict detected between release and pre-release. Aborting."
            git merge --abort || true
            exit 1
          fi

      - name: Push pre-release
        run: git push origin pre-release

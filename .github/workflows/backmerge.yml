name: Backmerge

on:
  push:
    branches:
      - pre-release
      - release

jobs:
  backmerge:
    runs-on: ubuntu-latest
    steps:
      - name: Set branches
        id: branches
        run: |
          if [ "${{ github.ref_name }}" = "release" ]; then
            echo "source=release" >> $GITHUB_OUTPUT
            echo "target=pre-release" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "pre-release" ]; then
            echo "source=pre-release" >> $GITHUB_OUTPUT
            echo "target=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branches.outputs.target }}
          fetch-depth: 0
          token: ${{ secrets.BACKMERGE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.BACKMERGE_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Merge source into target
        id: merge
        env:
          GH_TOKEN: ${{ secrets.BACKMERGE_TOKEN }}
          SOURCE: ${{ steps.branches.outputs.source }}
          TARGET: ${{ steps.branches.outputs.target }}
        run: |
          git fetch origin "$SOURCE"
          if ! git merge "origin/$SOURCE" 2>&1; then
            echo ""
            echo "===== CONFLICTING FILES ====="
            conflicts=$(git diff --name-only --diff-filter=U)
            echo "$conflicts"
            echo "=============================="
            echo ""
            {
              echo "conflicts<<EOF"
              echo "$conflicts"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            git merge --abort || true

            pr_url=$(gh pr list --base "$TARGET" --head "$SOURCE" --state open --json url -q '.[0].url')
            if [ -z "$pr_url" ]; then
              pr_url=$(gh pr create \
                --base "$TARGET" \
                --head "$SOURCE" \
                --title "Backmerge: $SOURCE → $TARGET (conflicts)" \
                --body "Automated backmerge from \`$SOURCE\` to \`$TARGET\` failed due to merge conflicts. Please resolve the conflicts and merge this PR manually.")
            fi
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

            echo "::error::Merge conflict between $SOURCE and $TARGET. Resolve via PR: $pr_url"
            exit 1
          fi

      - name: Notify Flock on merge conflict
        if: failure() && steps.merge.outcome == 'failure'
        env:
          FLOCK_WEBHOOK_URL: ${{ secrets.FLOCK_WEBHOOK_URL }}
          SOURCE: ${{ steps.branches.outputs.source }}
          TARGET: ${{ steps.branches.outputs.target }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          message="❌ Backmerge failed: ${SOURCE} → ${TARGET}
          Repo: ${REPO}
          Reason: Merge conflict
          Conflicting files:
          ${CONFLICTS}
          Run: ${RUN_URL}"
          payload=$(jq -n --arg text "$message" '{text: $text}')
          curl -X POST "$FLOCK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Push target
        run: git push origin ${{ steps.branches.outputs.target }}